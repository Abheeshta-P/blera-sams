services:
  backend:
    image: node:24.7.0-alpine
    working_dir: /backend
    environment:
      - PORT=6767
    volumes:
      - ../backend:/backend
    ports:
      - "6767:6767"
    command: sh -c "npm install && npm run dev"

  frontend:
    image: node:24.7.0-alpine
    working_dir: /frontend
    environment:
      - PORT=3000
    volumes:
      - ../frontend:/frontend
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev"
